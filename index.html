<html>
	<head>
    <title>Richard Chien</title>
    <link rel="shortcut icon" href="portfolio/images/favicon.png">
    <link type="text/css" rel="stylesheet" href="main.css">
    <link href="https://fonts.googleapis.com/css?family=Poiret+One" rel="stylesheet">

	</head>
	<body>
    <script src="portfolio/lib/jquery/jquery.min.js"></script>
    <script src="https://threejs.org/build/three.min.js"></script>
    <script src="https://threejs.org/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://threejs.org/examples/js/controls/OrbitControls.js"></script>
    <script src="https://threejs.org/examples/js/loaders/DRACOLoader.js"></script>
    <script src="portfolio/lib/typed/typed.js"></script>
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-130572589-1"></script>

    <div id="container"></div>

		<div id="info">
      <a href="./portfolio">
        <p><span class="typed"></span></p>
      </a>
		</div>
    
		<script>

      var renderer = new THREE.WebGLRenderer({ alpha: true, antialiase: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);
      renderer.gammaOutput = true;
      //===================================================== scene
      var scene = new THREE.Scene();

      var camera = new THREE.PerspectiveCamera( 60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.x = 0.047;     
      camera.position.y = 0.005;
      camera.position.z = 1.152;
      camera.rotation.x = -0.005;
      camera.rotation.y = 0.004;
      camera.rotation.z = 0.002;

      var controls = new THREE.OrbitControls( camera, renderer.domElement );
      controls.addEventListener('change', render);
      //===================================================== lights
      var light = new THREE.DirectionalLight(0x999999, 1.2);
      light.position.set(1, 0, 1).normalize();
      scene.add(light);
      var light = new THREE.DirectionalLight(0x888888, 1);
      light.position.set(-1, 0, 0).normalize();
      scene.add(light);

      //===================================================== draco
      var loader = new THREE.GLTFLoader();
      var dracoLoader = new THREE.DRACOLoader();
      dracoLoader.setDecoderPath('https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/js/libs/draco/');
      loader.setDRACOLoader(dracoLoader);
      
      //===================================================== model
      var mixer;
      var model;
      loader.load("gltf/me.glb", function(gltf) {
        
           gltf.scene.traverse( function( node ) {
              if ( node instanceof THREE.Mesh ) { 
                node.castShadow = true; 
                node.material.side = THREE.DoubleSide;
                node.frustumCulled = false;
              }
            });
          
          model = gltf.scene;
          model.scale.set(.007, .007, .007);
          model.position.y = -0.37;
          scene.add(model);
          
          console.log(gltf.animations); //shows all animations
          
          mixer = new THREE.AnimationMixer(model);
          animation = mixer.clipAction(gltf.animations[0])
          animation.setDuration(3.5);
          animation.setLoop( THREE.LoopOnce );
          animation.clampWhenFinished = true;
          animation.play();
          
          //document.body.addEventListener("click", kill);
          function kill() {
            mixer.clipAction(gltf.animations[1]).stop();
            mixer.clipAction(gltf.animations[0]).play();
            setTimeout(function() {
              mixer.clipAction(gltf.animations[0]).stop();
              mixer.clipAction(gltf.animations[1]).play();
            }, 1500);
          } 
      });
    
      //===================================================== animate
      var clock = new THREE.Clock();
      function render() {
        
        requestAnimationFrame(render);
        var delta = clock.getDelta();
        if (mixer != null) mixer.update(delta);
        renderer.render(scene, camera);

      }

      render();

      window.addEventListener( 'resize', onWindowResize, false );

			function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize( window.innerWidth, window.innerHeight );
      } 

      var typed = $(".typed");
      function type() {
        typed.typed({
          strings: ["Click to view my portfolio."],
          startDelay: 1000,
          typeSpeed: 60,
          cursorChar: '_',
        });
      };
      type();

    </script>

    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'UA-130572589-1');
    </script>
	</body>
</html>
